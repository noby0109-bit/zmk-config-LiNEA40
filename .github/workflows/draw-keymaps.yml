name: Draw Keymaps
on:
  push:
    paths:
      - 'config/*.keymap'
      - '.github/workflows/draw-keymaps.yml'
  workflow_dispatch:

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-keymap.yml@main
    permissions:
      contents: write
    with:
      keymap_path: "config/LiNEA40.keymap"
      config_path: "config/keymap-drawer.config.yaml"
      output_folder: "keymap-drawer"
      parse_args: "-c config/keymap-drawer.config.yaml"
      draw_args: ""
